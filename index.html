<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>NeuroStudy AI</title>

  <!-- PDF.js -->
  <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/2.16.105/pdf.min.js"></script>

  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      font-family: Inter, system-ui, sans-serif;
    }

    body {
      background: #f7f4ff;
      color: #1f1f2e;
    }

    header {
      padding: 20px 7%;
      display: flex;
      justify-content: space-between;
      align-items: center;
    }

    .logo {
      font-weight: 800;
      font-size: 1.3rem;
      color: #6c4df6;
    }

    .hero {
      padding: 40px 7%;
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 40px;
      align-items: center;
    }

    .hero h1 {
      font-size: 2.5rem;
      margin-bottom: 20px;
    }

    .hero h1 span {
      color: #6c4df6;
    }

    .hero p {
      color: #555;
      margin-bottom: 20px;
    }

    .mockup {
      background: white;
      border-radius: 25px;
      padding: 20px;
      box-shadow: 0 20px 50px rgba(0,0,0,0.1);
    }

    textarea {
      width: 100%;
      min-height: 130px;
      border-radius: 15px;
      border: 2px solid #eee;
      padding: 12px;
      margin-top: 10px;
      outline: none;
    }

    input[type="file"] {
      margin-top: 10px;
    }

    .modes {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 10px;
      margin: 15px 0;
    }

    .mode {
      padding: 10px;
      border-radius: 12px;
      border: 2px solid #eee;
      background: #fafafa;
      cursor: pointer;
      font-weight: bold;
    }

    .mode.active {
      background: #eee9ff;
      border-color: #6c4df6;
      color: #6c4df6;
    }

    .btn {
      width: 100%;
      padding: 12px;
      background: #6c4df6;
      color: white;
      border: none;
      border-radius: 12px;
      cursor: pointer;
      font-weight: bold;
    }

    .result {
      margin-top: 15px;
      background: #111827;
      color: white;
      padding: 15px;
      border-radius: 15px;
    }

    @media(max-width: 800px){
      .hero {
        grid-template-columns: 1fr;
      }
    }
  </style>
</head>

<body>

<header>
  <div class="logo">NeuroStudy AI</div>
</header>

<section class="hero">
  <div>
    <h1>Convierte el estudio en algo <span>claro</span></h1>
    <p>Pega texto o sube un PDF y transfórmalo en contenido fácil de entender.</p>
  </div>

  <div class="mockup">
    <label>Sube un PDF:</label>
    <input type="file" id="pdfUpload" accept="application/pdf">

    <textarea id="inputText" placeholder="O pega tu texto aquí..."></textarea>

    <div class="modes">
      <button class="mode active" onclick="selectMode(this,'facil')">Fácil</button>
      <button class="mode" onclick="selectMode(this,'tdah')">TDAH</button>
      <button class="mode" onclick="selectMode(this,'examen')">Examen</button>
      <button class="mode" onclick="selectMode(this,'visual')">Visual</button>
    </div>

    <button class="btn" onclick="generateResult()">Procesar</button>

    <div class="result" id="result">
      Aquí aparecerá el resultado
    </div>
  </div>
</section>

<script>
let currentMode = "facil";

function selectMode(btn, mode){
  currentMode = mode;
  document.querySelectorAll(".mode").forEach(b=>b.classList.remove("active"));
  btn.classList.add("active");
}

function generateResult(){
  const text = document.getElementById("inputText").value;

  const outputs = {
    facil: "Resumen sencillo:\n- Idea principal\n- Explicación simple\n- Conclusión clara",
    tdah: "Modo TDAH:\nPaso 1: lee poco\nPaso 2: subraya\nPaso 3: resume en 1 frase",
    examen: "Preguntas:\n1. ¿Qué dice el texto?\n2. ¿Conceptos clave?\n3. ¿Ejemplo?",
    visual: "Mapa mental:\nTema → ideas → ejemplos → conclusión"
  };

  document.getElementById("result").innerText = outputs[currentMode];
}

const fileInput = document.getElementById("pdfUpload");
const textarea = document.getElementById("inputText");

fileInput.addEventListener("change", async (e) => {
  const file = e.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = async function () {
    const typedarray = new Uint8Array(this.result);
    const pdf = await pdfjsLib.getDocument(typedarray).promise;

    let text = "";

    for (let i = 1; i <= pdf.numPages; i++) {
      const page = await pdf.getPage(i);
      const content = await page.getTextContent();
      const strings = content.items.map(item => item.str);
      text += strings.join(" ") + "\n\n";
    }

    textarea.value = text;
  };

  reader.readAsArrayBuffer(file);
});
</script>

</body>
</html>
